# Look and feel

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(ccccccff)
    col.inactive_border = rgba(444444ff)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 0
    
    blur {
        enabled = false
    }
    
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1
    
    animation = windows, 1, 3, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = border, 1, 5, default
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, smooth, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
}
