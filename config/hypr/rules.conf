# Window and workspace rules

# Float specific windows
windowrule {
  name = windowrule-1
  float = 1
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-2
  float = 1
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-3
  float = 1
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-4
  float = 1
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-5
  float = 1
  match:class = ^(xdg-desktop-portal-gtk)$
}


# Dialogs should float 1
windowrule {
  name = windowrule-6
  float = 1
  match:title = ^(Open File)$
}

windowrule {
  name = windowrule-7
  float = 1
  match:title = ^(Save File)$
}

windowrule {
  name = windowrule-8
  float = 1
  match:title = ^(Select a File)$
}

windowrule {
  name = windowrule-9
  float = 1
  match:class = ^(.*)
  match:title = ^(.*Authentication Required.*)$
}


# Center float 1ing windows
windowrule {
  name = windowrule-10
  center = on
  float = 1ing:1
}


# Opacity for certain apps (optional, remove if you want pure matte black everywhere)
# windowrule = opacity 0.95 0.95, class:^(ghostty)$

